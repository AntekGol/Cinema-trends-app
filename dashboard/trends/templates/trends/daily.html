{% extends "trends/base.html" %}
{% load trend_filters %}

{% block title %}Daily Trends{% endblock %}

{% block content %}
<div class="page-content animate-fade-in">
    <h1 class="page-title"> Daily Trends <span class="date-badge">{{ selected_date }}</span></h1>

    <!-- Filters -->
    <form id="filter-form" class="filter-bar glass-card" hx-get="{% url 'trends:daily' %}" hx-target="#trend-results" hx-trigger="change">
        <div class="filter-group">
            <label>Date</label>
            <select name="date" class="filter-select">
                {% for d in available_dates %}
                <option value="{{ d|date:'Y-m-d' }}" {% if d == selected_date %}selected{% endif %}>{{ d|date:'M d, Y' }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="filter-group">
            <label>Type</label>
            <div class="filter-tabs">
                <input type="radio" name="media_type" value="all" id="type-all" style="display:none;" {% if media_type == 'all' %}checked{% endif %}>
                <label for="type-all" class="filter-tab {% if media_type == 'all' %}active{% endif %}" onclick="document.querySelectorAll('.filter-tab').forEach(l=>l.classList.remove('active')); this.classList.add('active');">All</label>

                <input type="radio" name="media_type" value="movie" id="type-movie" style="display:none;" {% if media_type == 'movie' %}checked{% endif %}>
                <label for="type-movie" class="filter-tab {% if media_type == 'movie' %}active{% endif %}" onclick="document.querySelectorAll('.filter-tab').forEach(l=>l.classList.remove('active')); this.classList.add('active');">Movies</label>

                <input type="radio" name="media_type" value="tv" id="type-tv" style="display:none;" {% if media_type == 'tv' %}checked{% endif %}>
                <label for="type-tv" class="filter-tab {% if media_type == 'tv' %}active{% endif %}" onclick="document.querySelectorAll('.filter-tab').forEach(l=>l.classList.remove('active')); this.classList.add('active');">TV Shows</label>
            </div>
        </div>
    </form>

    <!-- Results -->
    <div id="trend-results">
        {% include "trends/partials/_trend_table.html" %}
    </div>
</div>
{% endblock %}
